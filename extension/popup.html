<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>AI Usage</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; width: 360px; background: #0f1115; color: #e6e6e6; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #2a2f3a; }
  h1 { font-size: 12px; margin: 0; letter-spacing: 1px; text-transform: uppercase; color: #aaa; }
  button { background: #2a2f3a; color: #e6e6e6; border: 1px solid #3a4050; padding: 4px 10px; border-radius: 4px; cursor: pointer; font: inherit; font-size: 12px; }
  button:hover { background: #343a47; }
  button:disabled { opacity: 0.6; cursor: wait; }
  .body { padding: 10px 12px; max-height: 480px; overflow: auto; }
  .card { background: #181b22; border: 1px solid #2a2f3a; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
  .card h2 { margin: 0 0 4px; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; color: #7dd3fc; }
  .plan { color: #666; font-size: 10px; margin-bottom: 4px; }
  .window { font-size: 11px; margin: 6px 0 0; }
  .whead { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .wlabel { color: #bbb; }
  .pct { font-variant-numeric: tabular-nums; }
  .bar { height: 4px; background: #242935; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #facc15 60%, #ef4444); }
  .reset { font-size: 10px; color: #666; margin-top: 1px; }
  .err { color: #ff6b6b; font-size: 11px; }
  .foot { padding: 6px 14px; font-size: 10px; color: #555; border-top: 1px solid #2a2f3a; display: flex; justify-content: space-between; }
  a { color: #7dd3fc; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <h1>AI Usage</h1>
  <button id="refresh">Refresh</button>
</header>
<div class="body" id="body">Loading…</div>
<div class="foot">
  <a id="open-dashboard">Dashboard</a>
  <a id="open-options">Options</a>
</div>
<script src="popup.js" type="module"></script>
</body>
</html>
